<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="102" height="102" viewBox="151 412 102 102" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <!-- D monogram with circular counter (hole), evenodd -->
    <path id="dbody" fill-rule="evenodd" d="M16 12 H34 A20 20 0 0 1 34 52 H16 Z M48 32 a12 12 0 1 0 -24 0 a12 12 0 1 0 24 0 Z"/>
    <!-- Solid D (no counter) for small sizes / tiles -->
    <path id="dsolid" d="M16 12 H34 A20 20 0 0 1 34 52 H16 Z"/>
    <!-- core node -->
    <circle id="dot" cx="36" cy="32" r="6"/>
  </defs>

  <!-- eyebrow -->
  <text x="64" y="92" font-size="13" letter-spacing="3" font-weight="700" fill="#17181D">DOMONOR</text>
  <text x="1176" y="92" font-size="13" letter-spacing="2.5" font-weight="600" fill="#8C8884" text-anchor="end">SOFTWARE DEVELOPMENT &#xB7; IDENTITY</text>
  <line x1="64" y1="112" x2="1176" y2="112" stroke="#17181D" stroke-opacity="0.10"/>

  <!-- HERO primary lockup -->
  <g transform="translate(96,150) scale(2.05)">
    <use href="#dbody" fill="#17181D"/>
    <use href="#dot" fill="#FF5C39"/>
  </g>
  <text x="292" y="246" font-size="68" font-weight="700" letter-spacing="-1.5" fill="#17181D">domonor</text>
  <text x="296" y="282" font-size="15" letter-spacing="1.5" font-weight="500" fill="#8C8884">full-stack software, cleanly built</text>

  <line x1="64" y1="330" x2="1176" y2="330" stroke="#17181D" stroke-opacity="0.10"/>

  <!-- DARK band: reversed lockup + app tile -->
  <g transform="translate(132,398) scale(2.05)">
    <use href="#dbody" fill="#F6F4EF"/>
    <use href="#dot" fill="#FF5C39"/>
  </g>
  <text x="328" y="494" font-size="68" font-weight="700" letter-spacing="-1.5" fill="#F6F4EF">domonor</text>
  <text x="332" y="530" font-size="15" letter-spacing="1.5" font-weight="500" fill="#7C7974">reversed &#xB7; on ink</text>

  <!-- app tile -->
  <rect x="988" y="400" width="128" height="128" rx="30" fill="#FF5C39"/>
  <g transform="translate(1004,408) scale(1.5)">
    <use href="#dsolid" fill="#FFF7F2"/>
  </g>
  <text x="1052" y="552" font-size="12" letter-spacing="1.5" font-weight="600" fill="#7C7974" text-anchor="middle">APP ICON</text>

  <!-- WORDMARK variants -->
  <text x="64" y="640" font-size="12" letter-spacing="2.5" font-weight="700" fill="#8C8884">WORDMARK &#xB7; ACCENT VARIANT</text>
  <text x="64" y="700" font-size="52" font-weight="700" letter-spacing="-1" fill="#17181D">d<tspan fill="#FF5C39">o</tspan>m<tspan fill="#FF5C39">o</tspan>n<tspan fill="#FF5C39">o</tspan>r</text>
  <text x="470" y="700" font-size="52" font-weight="700" letter-spacing="-1" fill="#17181D">domonor</text>
  <text x="470" y="725" font-size="12" letter-spacing="1.5" fill="#8C8884">monochrome</text>
  <text x="64" y="725" font-size="12" letter-spacing="1.5" fill="#8C8884">the three o's as ordered nodes</text>

  <line x1="64" y1="760" x2="1176" y2="760" stroke="#17181D" stroke-opacity="0.10"/>

  <!-- bottom utilities -->
  <!-- mark treatments -->
  <text x="64" y="804" font-size="12" letter-spacing="2.5" font-weight="700" fill="#8C8884">MARK</text>
  <g transform="translate(64,820) scale(1.05)"><use href="#dbody" fill="#17181D"/><use href="#dot" fill="#FF5C39"/></g>
  <g transform="translate(150,820) scale(1.05)"><use href="#dbody" fill="#17181D"/><use href="#dot" fill="#17181D"/></g>
  <rect x="232" y="818" width="74" height="74" rx="14" fill="#17181D"/>
  <g transform="translate(238,824) scale(1.05)"><use href="#dbody" fill="#F6F4EF"/><use href="#dot" fill="#FF5C39"/></g>
  <text x="64" y="912" font-size="11" fill="#8C8884">primary</text>
  <text x="150" y="912" font-size="11" fill="#8C8884">mono</text>
  <text x="244" y="912" font-size="11" fill="#8C8884">reversed</text>

  <!-- palette -->
  <text x="430" y="804" font-size="12" letter-spacing="2.5" font-weight="700" fill="#8C8884">PALETTE</text>
  <g font-size="11" font-weight="600">
    <rect x="430" y="818" width="74" height="74" rx="14" fill="#17181D"/>
    <text x="430" y="912" fill="#8C8884">Ink #17181D</text>
    <rect x="516" y="818" width="74" height="74" rx="14" fill="#FF5C39"/>
    <text x="516" y="912" fill="#8C8884">Signal #FF5C39</text>
    <rect x="602" y="818" width="74" height="74" rx="14" fill="#F6F4EF" stroke="#17181D" stroke-opacity="0.12"/>
    <text x="602" y="912" fill="#8C8884">Paper #F6F4EF</text>
    <rect x="688" y="818" width="74" height="74" rx="14" fill="#8C8884"/>
    <text x="688" y="912" fill="#8C8884">Muted #8C8884</text>
  </g>

  <!-- favicon scales -->
  <text x="840" y="804" font-size="12" letter-spacing="2.5" font-weight="700" fill="#8C8884">SCALES TO A FAVICON</text>
  <rect x="840" y="826" width="64" height="64" rx="15" fill="#FF5C39"/>
  <g transform="translate(848,834) scale(0.75)"><use href="#dsolid" fill="#FFF7F2"/></g>
  <text x="872" y="908" font-size="10" fill="#8C8884" text-anchor="middle">64</text>
  <rect x="932" y="826" width="32" height="32" rx="8" fill="#FF5C39"/>
  <g transform="translate(936,830) scale(0.375)"><use href="#dsolid" fill="#FFF7F2"/></g>
  <text x="948" y="908" font-size="10" fill="#8C8884" text-anchor="middle">32</text>
  <rect x="988" y="826" width="16" height="16" rx="4" fill="#FF5C39"/>
  <g transform="translate(990,828) scale(0.1875)"><use href="#dsolid" fill="#FFF7F2"/></g>
  <text x="996" y="908" font-size="10" fill="#8C8884" text-anchor="middle">16</text>

  <!-- alt accent hint -->
  <text x="1060" y="804" font-size="12" letter-spacing="2.5" font-weight="700" fill="#8C8884">ALT</text>
  <rect x="1060" y="818" width="50" height="74" rx="14" fill="#14B6A6"/>
  <rect x="1118" y="818" width="50" height="74" rx="14" fill="#2D6CDF"/>
  <text x="1060" y="912" font-size="10" fill="#8C8884">teal / blue</text>
</svg>
